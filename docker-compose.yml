services:
  db:
    image: postgres:16-alpine
    container_name: dona-angela-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: donaangela
    volumes:
      - dona-angela-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d donaangela"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dona-angela-pgdata:
